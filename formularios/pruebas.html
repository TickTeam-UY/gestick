<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GesTIck - Planilla de uso de laboratorio</title>
</head>
<body>
    <header>
        <img src="/gestick github/gestick/imagenes/logo-app.png" alt="Logo GesTIck">
    </header>
    <main>
        <section>
            <form action="procesar_planilla.php" method="POST" name="datos">
                <table border="1" cellpadding="10">
                    <tr>
                        <td colspan="8" align="center">
                            <b>Planilla de uso de laboratorio</b>
                        </td>    
                    </tr>
                    <tr>
                        <td>Docente</td> <!--- esto luego será rellenado automáticamente con el nombre del docente que inició sesión, se podria sacar de la pantalla para achicar la planilla y que se vea al final como texto --->
                        <td>
                            <p> < Nombre del docente > </p>
                        </td>
                        <td>Fecha</td>
                        <td><input type="date" name="fecha"></td>
                        <td>Hora de entrada</td>
                        <td><input type="time" name="hora_entrada"></td>
                        <td>Hora de salida</td>
                        <td><input type="time" name="hora_salida"></td>
                    </tr>
                    <tr>
                        <td>Grupo</td> <!--- esto luego será un menú desplegable automático con los grupos que tiene asignados el docente que inició sesión --->
                            <td>
                                <select id="grupo" name="grupo">
                                    <option value="" selected disabled>Seleccione un grupo</option>
                                    <option value="3MF">3°MF</option>
                                    <option value="3MH">3°MH</option>
                                    <option value="3MI">3°MI</option>
                                </select>
                            </td>
                        <td>Turno</td>
                        <td>
                            <select name="turno"> <!--- esto luego será rellenado automáticamente con el turno que tiene asignado el docente que inició sesión --->
                                <option value="M">Mañana</option>
                                <option value="T">Tarde</option>
                                <option value="N">Noche</option>
                            </select>
                        </td>
                        <td>Asignatura</td> <!--- esto luego será un menú desplegable automático con las asignaturas asignadas al usuario que inició sesión o rellenado automáticamente si tiene una sola asignatura --->
                        <td>
                            <select id="asignatura" name="asignatura">
                                    <option value="" selected disabled>Seleccione una asignatura</option>
                                    <option value="Programacion"> Programación Full Stack</option>
                                    <option value="Sistemas"> Sistemas Operativos</option>
                                    <option value="Ingenieria"> Ingeniería de Software</option>
                                    <option value="UTULAB"> Tutoría de Proyecto UTULAB</option>
                            </select>
                        </td>
                        <td>Aula</td>
                        <td>
                            <select name="aula">
                                <option value="" selected disabled>Seleccione un aula</option>
                                <option value="Lab1">Laboratorio 1</option>
                                <option value="Lab2">Laboratorio 2</option>
                                <option value="Lab3">Laboratorio 3</option>
                                <option value="Lab4">Laboratorio 4</option>
                                <option value="Lab5">Laboratorio 5</option>
                                <option value="Lab6">Laboratorio 6</option>
                                <option value="Taller1">Taller 1</option>
                                <option value="Taller2">Taller 2</option>
                                <option value="Taller3">Taller 3</option>
                            </select>
                        </td>
                    </tr>
                </table>
                <br>
                <table border="1" cellpadding="10">
                    <tr>
                        <td>
                            <b>N° Equipo</b>
                        </td>
                        <td>
                            <b>Nombre y Apellido</b>
                        </td>
                        <td>
                            <b>Estado del Equipo</b>
                        </td>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>
                            <select id="alumno" name="alumno">
                                    <option value="" selected disabled>Seleccione un alumno</option>
                                    <option value="54741781">Samara González</option>
                                    <option value="12345678">Rodrigo Rodríguez</option>
                                    <option value="12345679">Victoria Garderes</option>
                                    <option value="12345680">Roberto Marisquirena</option>
                            </select>
                        </td>
                        <td>
                            <select name="estado[]">
                                <option value="Correcto" selected>Correcto</option>
                                <option value="Faltante">Faltante</option>
                                <option value="Daniado">Dañado</option>
                            </select>
                        </td>
                        <tr id="filaProblema" hidden>
                            <td>Problema</td>
                            <td>
                                <textarea name="problema"></textarea>
                            </td>
                        </tr>
                        <tr id="filaObservaciones" hidden>
                            <td>Observaciones</td>
                            <td>
                                <textarea name="observaciones"></textarea>
                            </td>
                        </tr>
                    </tr>
                </table>
            </form>
        </section>
    </main>

                document.getElementById("filaProblema").hidden = true;

                    document.getElementById("filaProblema").hidden = false;
                    document.getElementById("filaObservaciones").hidden = false;
                }
            }
            window.onload = mostrarCamposPL;
        </script>
</body>
</html>
