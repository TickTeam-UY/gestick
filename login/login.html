<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>GesTIck - Inicio de sesión</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="loginstyleV2.css">
    </head>
    <body>
        <header>
                    <img src="logo-app.png" alt="Logo GesTIck">
        </header>
        <main>
                <section>
                    <form action="procesar.php" method="POST" name="datos">
                        <table border="1" cellpadding="10">
                            <tr>
                                <td colspan="2" align="center">
                                    <b>Inicio de sesión</b>
                                </td>
                            </tr>
                            <tr>
                                <td>Correo electrónico</td>
                                <td><input type="email" name="correo" size="25" maxlength="254"></td>
                            </tr>
                            <tr>
                                <td>Contraseña</td>
                                <td><input type="password" name="contrasenia" size="25" maxlength="25"></td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center"><input type="submit" value="Ingresar"></td>
                            </tr>
                        </table>
                    </form>
                </section>
        </main>
        <footer>
            <p>GesTIck - Sistema de Gestión de Recursos y Soporte de Informática</p>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
